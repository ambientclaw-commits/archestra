{{- if .Values.archestra.orchestrator.kubernetes.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "archestra-platform.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
  {{- with .Values.archestra.orchestrator.kubernetes.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.archestra.orchestrator.kubernetes.serviceAccount.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml .Values.archestra.orchestrator.kubernetes.serviceAccount.imagePullSecrets | nindent 2 }}
{{- end }}
{{- end }}
{{- if .Values.archestra.orchestrator.kubernetes.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "archestra-platform.fullname" . }}-mcp-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
rules:
{{ include "archestra-platform.mcpManagerRules" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "archestra-platform.fullname" . }}-mcp-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "archestra-platform.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "archestra-platform.fullname" . }}-mcp-manager
  apiGroup: rbac.authorization.k8s.io
{{- /*
Grant the platform ServiceAccount the same MCP-manager permissions in additional
namespaces (the K8s namespaces backing deployment environments). Each gets its own
namespace-scoped Role + RoleBinding; the binding's subject points back at the SA in
the release namespace. The release namespace is skipped — its Role/RoleBinding is
already created above, and re-emitting it would collide on name.
*/}}
{{- range $ns := .Values.archestra.orchestrator.kubernetes.rbac.environmentNamespaces }}
{{- if ne $ns $.Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "archestra-platform.fullname" $ }}-mcp-manager
  namespace: {{ $ns }}
  labels:
    {{- include "archestra-platform.labels" $ | nindent 4 }}
rules:
{{ include "archestra-platform.mcpManagerRules" $ }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "archestra-platform.fullname" $ }}-mcp-manager
  namespace: {{ $ns }}
  labels:
    {{- include "archestra-platform.labels" $ | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "archestra-platform.serviceAccountName" $ }}
  namespace: {{ $.Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "archestra-platform.fullname" $ }}-mcp-manager
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
{{- end }}
